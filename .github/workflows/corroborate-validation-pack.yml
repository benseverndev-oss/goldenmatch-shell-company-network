name: corroborate validation pack (Railway-side compute)

on:
  workflow_dispatch:
    inputs:
      community_id:
        description: "Community ID to corroborate (must already have a validation pack)"
        required: true
        type: string
      person:
        description: 'Human anchor (e.g. "calvin edward ayre")'
        required: true
        type: string
      run_external_search:
        description: "Hit Tavily for external corroboration"
        required: false
        type: boolean
        default: true
      max_queries:
        description: "Cap on Tavily queries (default 60)"
        required: false
        type: string
        default: "60"

concurrency:
  group: corroborate-validation-pack-${{ inputs.community_id }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  corroborate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SHELLNET_JOB_URL: ${{ vars.SHELLNET_JOB_URL }}
      SHELLNET_JOB_TOKEN: ${{ secrets.SHELLNET_JOB_TOKEN }}
      CID: ${{ inputs.community_id }}
      PERSON: ${{ inputs.person }}
      MAX_QUERIES: ${{ inputs.max_queries }}
      RUN_SEARCH: ${{ inputs.run_external_search }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --frozen --no-dev
      - run: curl -fsS "$SHELLNET_JOB_URL/healthz"

      - name: Validate inputs
        run: |
          set -euo pipefail
          if ! echo "$CID" | grep -qE '^[0-9]+$'; then
            echo "::error::community_id must be a positive integer"; exit 1
          fi
          if ! echo "$PERSON" | grep -qE "^[A-Za-z][A-Za-z .'-]{1,80}$"; then
            echo "::error::person must match the same regex as build-validation-pack"; exit 1
          fi

      - name: Trigger corroboration
        run: |
          set -euo pipefail
          person_enc=$(python -c "import urllib.parse,os; print(urllib.parse.quote(os.environ['PERSON']))")
          curl -fsS -X POST -H "Authorization: Bearer $SHELLNET_JOB_TOKEN" \
            "$SHELLNET_JOB_URL/run-corroboration?community_id=$CID&person=$person_enc&run_external_search=$RUN_SEARCH&max_queries=$MAX_QUERIES"
          echo

      - name: Poll until complete
        run: |
          set -euo pipefail
          stage="script_corroborate_cluster_$CID"
          done=false
          for _ in $(seq 1 360); do
            sleep 5
            s=$(curl -fsS -H "Authorization: Bearer $SHELLNET_JOB_TOKEN" "$SHELLNET_JOB_URL/status" \
                | python -c "import sys,json; d=json.load(sys.stdin); print(d['stages'].get('$stage',{}).get('status','?'))")
            echo "  $stage: $s"
            case "$s" in
              completed) done=true; break ;;
              failed)
                curl -fsS -H "Authorization: Bearer $SHELLNET_JOB_TOKEN" \
                  "$SHELLNET_JOB_URL/logs/$stage?tail=200" || true
                exit 1 ;;
            esac
          done
          if [ "$done" != "true" ]; then echo "::error::poll timed out"; exit 1; fi

      - name: Download artifacts
        run: |
          set -euo pipefail
          mkdir -p docs/validation/data
          base="validation_packs/cluster_$CID"
          for p in cluster_$CID.md \
                   cluster_${CID}_research_brief.md \
                   cluster_${CID}_timeline.md \
                   cluster_${CID}_graph_paths.md \
                   data/cluster_${CID}_external_search_results.json \
                   data/cluster_${CID}_external_search_results.csv \
                   data/cluster_${CID}_external_hit_scores.csv \
                   data/cluster_${CID}_discovery_delta.csv \
                   data/cluster_${CID}_timeline.csv \
                   data/cluster_${CID}_evidence_ledger.csv \
                   data/cluster_${CID}_underreported_entities.csv; do
            # The first-stage pack files may already be on disk and unchanged;
            # we just re-pull them so corroborate outputs land in the same tree.
            curl -fsS -H "Authorization: Bearer $SHELLNET_JOB_TOKEN" \
              "$SHELLNET_JOB_URL/download?path=$base/$p" \
              -o "docs/validation/$p" || echo "skip $p"
          done

      - name: Commit + push to main
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/validation/cluster_$CID*.md docs/validation/data/cluster_${CID}_*
          if git diff --cached --quiet; then echo "no changes"; exit 0; fi
          git commit -m "report: corroboration pack for cluster $CID (auto from corroborate-validation-pack.yml)"
          git pull --rebase origin main
          git push origin HEAD:main
