name: Phase 10 — bridge SEC <-> ICIJ via normalised name (Railway-side)

# Reads the Phase-6 SEC 13D/G edges and the ICIJ entities table, matches
# SEC issuers/filers to US-jurisdiction ICIJ entities on exact normalised
# name, and emits sec_icij_bridges.parquet. The recluster job picks this
# up via --sec-icij-bridges so SEC nodes can finally reach the dossier-
# anchored BFS subgraph.

on:
  workflow_dispatch:

concurrency:
  group: bridge-sec-icij-by-name
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  bridge:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SHELLNET_JOB_URL: ${{ vars.SHELLNET_JOB_URL }}
      SHELLNET_JOB_TOKEN: ${{ secrets.SHELLNET_JOB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --frozen --no-dev
      - run: curl -fsS "$SHELLNET_JOB_URL/healthz"

      - name: Trigger bridge_sec_icij_by_name
        run: |
          set -euo pipefail
          curl -fsS -X POST -H "Authorization: Bearer $SHELLNET_JOB_TOKEN" \
            "$SHELLNET_JOB_URL/run-script?name=bridge_sec_icij_by_name"
          echo

      - name: Poll until complete
        run: |
          set -euo pipefail
          stage="script_bridge_sec_icij_by_name"
          done=false
          for _ in $(seq 1 360); do
            sleep 5
            s=$(curl -fsS -H "Authorization: Bearer $SHELLNET_JOB_TOKEN" "$SHELLNET_JOB_URL/status" \
                | python -c "import sys,json; d=json.load(sys.stdin); print(d['stages'].get('$stage',{}).get('status','?'))")
            echo "  $stage: $s"
            case "$s" in
              completed) done=true; break ;;
              failed)
                curl -fsS -H "Authorization: Bearer $SHELLNET_JOB_TOKEN" \
                  "$SHELLNET_JOB_URL/logs/$stage?tail=200" || true
                exit 1 ;;
            esac
          done
          if [ "$done" != "true" ]; then echo "::error::poll timed out"; exit 1; fi

      - name: Report output size
        run: |
          set -euo pipefail
          size=$(curl -s -H "Authorization: Bearer $SHELLNET_JOB_TOKEN" \
            -o /dev/null -w "%{size_download}" \
            "$SHELLNET_JOB_URL/download?path=processed/sec_icij_bridges.parquet")
          echo "  sec_icij_bridges.parquet: ${size:-?} bytes"
