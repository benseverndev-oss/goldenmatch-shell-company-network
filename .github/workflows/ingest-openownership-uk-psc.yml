name: ingest Open Ownership UK PSC BODS bundle (Railway-side compute)

on:
  workflow_dispatch:

concurrency:
  group: ingest-openownership-uk-psc
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    # Heavy job: 3.5 GB download + extract + 13.9M-row projection.
    timeout-minutes: 90
    env:
      SHELLNET_JOB_URL: ${{ vars.SHELLNET_JOB_URL }}
      SHELLNET_JOB_TOKEN: ${{ secrets.SHELLNET_JOB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --frozen --no-dev
      - run: curl -fsS "$SHELLNET_JOB_URL/healthz"

      - name: Trigger ingest_openownership_uk_psc
        run: |
          set -euo pipefail
          curl -fsS -X POST -H "Authorization: Bearer $SHELLNET_JOB_TOKEN" \
            "$SHELLNET_JOB_URL/run-script?name=ingest_openownership_uk_psc"
          echo

      - name: Poll until complete
        run: |
          set -euo pipefail
          stage="script_ingest_openownership_uk_psc"
          done=false
          # Allow up to 80 minutes for download + extract + projection.
          for _ in $(seq 1 960); do
            sleep 5
            s=$(curl -fsS -H "Authorization: Bearer $SHELLNET_JOB_TOKEN" "$SHELLNET_JOB_URL/status" \
                | python -c "import sys,json; d=json.load(sys.stdin); print(d['stages'].get('$stage',{}).get('status','?'))")
            echo "  $stage: $s"
            case "$s" in
              completed) done=true; break ;;
              failed)
                curl -fsS -H "Authorization: Bearer $SHELLNET_JOB_TOKEN" \
                  "$SHELLNET_JOB_URL/logs/$stage?tail=200" || true
                exit 1 ;;
            esac
          done
          if [ "$done" != "true" ]; then echo "::error::poll timed out"; exit 1; fi

      - name: Report file sizes
        run: |
          set -euo pipefail
          for f in oo_uk_psc_entities.parquet oo_uk_psc_persons.parquet oo_uk_psc_relationships.parquet; do
            size=$(curl -sI -H "Authorization: Bearer $SHELLNET_JOB_TOKEN" \
              "$SHELLNET_JOB_URL/download?path=processed/$f" | awk '/Content-Length/ {print $2}' | tr -d '\r')
            echo "  $f: ${size:-?} bytes"
          done
