name: build OpenAleph ingest bundle (Railway-side compute)

on:
  workflow_dispatch:
    inputs:
      community_id:
        description: "Community ID (must already have a validation pack + FTM export)"
        required: true
        type: string
      person:
        description: "Human anchor"
        required: true
        type: string

concurrency:
  group: build-aleph-bundle-${{ inputs.community_id }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  bundle:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SHELLNET_JOB_URL: ${{ vars.SHELLNET_JOB_URL }}
      SHELLNET_JOB_TOKEN: ${{ secrets.SHELLNET_JOB_TOKEN }}
      CID: ${{ inputs.community_id }}
      PERSON: ${{ inputs.person }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --frozen --no-dev
      - run: curl -fsS "$SHELLNET_JOB_URL/healthz"

      - name: Validate inputs
        run: |
          set -euo pipefail
          if ! echo "$CID" | grep -qE '^[0-9]+$'; then
            echo "::error::community_id must be a positive integer"; exit 1
          fi
          if ! echo "$PERSON" | grep -qE "^[A-Za-z][A-Za-z .'-]{1,80}$"; then
            echo "::error::person must match build-validation-pack regex"; exit 1
          fi

      - name: Trigger build_aleph_bundle
        run: |
          set -euo pipefail
          person_enc=$(python -c "import urllib.parse,os; print(urllib.parse.quote(os.environ['PERSON']))")
          curl -fsS -X POST -H "Authorization: Bearer $SHELLNET_JOB_TOKEN" \
            "$SHELLNET_JOB_URL/run-aleph-bundle?community_id=$CID&person=$person_enc"
          echo

      - name: Poll until complete
        run: |
          set -euo pipefail
          stage="script_aleph_bundle_cluster_$CID"
          done=false
          for _ in $(seq 1 120); do
            sleep 5
            s=$(curl -fsS -H "Authorization: Bearer $SHELLNET_JOB_TOKEN" "$SHELLNET_JOB_URL/status" \
                | python -c "import sys,json; d=json.load(sys.stdin); print(d['stages'].get('$stage',{}).get('status','?'))")
            echo "  $stage: $s"
            case "$s" in
              completed) done=true; break ;;
              failed)
                curl -fsS -H "Authorization: Bearer $SHELLNET_JOB_TOKEN" \
                  "$SHELLNET_JOB_URL/logs/$stage?tail=200" || true
                exit 1 ;;
            esac
          done
          if [ "$done" != "true" ]; then echo "::error::poll timed out"; exit 1; fi

      - name: Download bundle
        run: |
          set -euo pipefail
          mkdir -p docs/validation/data
          curl -fsS -H "Authorization: Bearer $SHELLNET_JOB_TOKEN" \
            "$SHELLNET_JOB_URL/download?path=validation_packs/cluster_$CID/data/cluster_${CID}_aleph_bundle.zip" \
            -o "docs/validation/data/cluster_${CID}_aleph_bundle.zip"

      - name: Commit + push to main
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/validation/data/cluster_${CID}_aleph_bundle.zip
          if git diff --cached --quiet; then echo "no changes"; exit 0; fi
          git commit -m "report: OpenAleph bundle for cluster $CID (auto from build-aleph-bundle.yml)"
          git pull --rebase origin main
          git push origin HEAD:main
