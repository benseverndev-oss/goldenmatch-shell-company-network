name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest + ruff
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint (ruff)
        # Scope to the modules + scripts we actively maintain. The
        # underscore-prefixed one-off scripts have pre-existing lint
        # nits that aren't worth fixing in CI.
        run: |
          uv run ruff check \
            src/shellnet \
            tests \
            scripts/build_*.py \
            scripts/ingest_*.py \
            scripts/investigate_*.py \
            scripts/expand_2hop.py \
            scripts/derive_seed_labels.py \
            scripts/eval_against_labels.py \
            scripts/coverage_report.py \
            scripts/run_goldenmatch_*.py \
            scripts/report_shared_addresses.py \
            scripts/generate_candidate_pairs.py \
            scripts/normalize_entities.py \
            scripts/rank_clusters.py \
            scripts/provenance_report.py \
            scripts/compute_centrality.py \
            scripts/eval_v1_vs_v2.py \
            scripts/filter_company_table.py \
            scripts/review_matches.py \
            scripts/upload_icij.py \
            scripts/fetch_icij.py \
            scripts/build_label_set.py

      - name: Test (pytest)
        run: uv run pytest -q
