name: build ER calibration benchmark (Railway-side compute)

# Refreshes docs/reports/calibration_benchmark.md.
# Spec: docs/superpowers/specs/2026-05-16-discovery-lift-benchmark.md
#   (calibration is a companion to discovery-lift)

on:
  workflow_dispatch:

concurrency:
  group: build-calibration-benchmark
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SHELLNET_JOB_URL: ${{ vars.SHELLNET_JOB_URL }}
      SHELLNET_JOB_TOKEN: ${{ secrets.SHELLNET_JOB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Sync deps
        run: uv sync --frozen --no-dev
      - name: Confirm Railway reachable
        run: curl -fsS "$SHELLNET_JOB_URL/healthz"
      - name: Trigger build_calibration_benchmark
        run: |
          set -euo pipefail
          curl -fsS -X POST \
            -H "Authorization: Bearer $SHELLNET_JOB_TOKEN" \
            "$SHELLNET_JOB_URL/run-script?name=build_calibration_benchmark"
          echo
      - name: Poll until complete
        run: |
          set -euo pipefail
          stage="script_build_calibration_benchmark"
          for _ in $(seq 1 120); do
            sleep 5
            s=$(curl -fsS -H "Authorization: Bearer $SHELLNET_JOB_TOKEN" \
                "$SHELLNET_JOB_URL/status" \
                | python -c "import sys,json; d=json.load(sys.stdin); print(d['stages'].get('$stage',{}).get('status','?'))")
            echo "  $stage: $s"
            case "$s" in
              completed) break ;;
              failed)
                curl -fsS -H "Authorization: Bearer $SHELLNET_JOB_TOKEN" \
                  "$SHELLNET_JOB_URL/logs/$stage?tail=120" || true
                exit 1
                ;;
            esac
          done
      - name: Download artifacts
        run: |
          set -euo pipefail
          mkdir -p data/processed docs/reports/data
          for p in processed/calibration_metrics.parquet \
                   processed/calibration_summary.json \
                   processed/erscore_calibrator.json; do
            curl -fsS -H "Authorization: Bearer $SHELLNET_JOB_TOKEN" \
              "$SHELLNET_JOB_URL/download?path=$p" -o "data/$p"
            cp "data/$p" "docs/reports/data/$(basename $p)"
          done
      - name: Render markdown
        run: |
          set -euo pipefail
          uv run python scripts/render_calibration_benchmark.py \
            --metrics docs/reports/data/calibration_metrics.parquet \
            --summary docs/reports/data/calibration_summary.json \
            --out docs/reports/calibration_benchmark.md
      - name: Commit + push to main
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/reports/calibration_benchmark.md \
                  docs/reports/data/calibration_metrics.parquet \
                  docs/reports/data/calibration_summary.json \
                  docs/reports/data/erscore_calibrator.json
          if git diff --cached --quiet; then
            echo "No changes; report unchanged."
            exit 0
          fi
          git commit -m "report: refresh calibration benchmark (auto from build-calibration-benchmark.yml)"
          git push origin HEAD:main
