name: Phase 3 — detect cross-jurisdictional twins (Railway-side compute)

on:
  workflow_dispatch:

concurrency:
  group: detect-cross-jurisdiction-twins
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  detect:
    runs-on: ubuntu-latest
    # ICIJ entities x OO UK PSC entities (~13.9M rows) — give it room.
    timeout-minutes: 30
    env:
      SHELLNET_JOB_URL: ${{ vars.SHELLNET_JOB_URL }}
      SHELLNET_JOB_TOKEN: ${{ secrets.SHELLNET_JOB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --frozen --no-dev
      - run: curl -fsS "$SHELLNET_JOB_URL/healthz"

      - name: Trigger detect_cross_jurisdiction_twins
        run: |
          set -euo pipefail
          curl -fsS -X POST -H "Authorization: Bearer $SHELLNET_JOB_TOKEN" \
            "$SHELLNET_JOB_URL/run-script?name=detect_cross_jurisdiction_twins"
          echo

      - name: Poll until complete
        run: |
          set -euo pipefail
          stage="script_detect_cross_jurisdiction_twins"
          done=false
          for _ in $(seq 1 360); do
            sleep 5
            s=$(curl -fsS -H "Authorization: Bearer $SHELLNET_JOB_TOKEN" "$SHELLNET_JOB_URL/status" \
                | python -c "import sys,json; d=json.load(sys.stdin); print(d['stages'].get('$stage',{}).get('status','?'))")
            echo "  $stage: $s"
            case "$s" in
              completed) done=true; break ;;
              failed)
                curl -fsS -H "Authorization: Bearer $SHELLNET_JOB_TOKEN" \
                  "$SHELLNET_JOB_URL/logs/$stage?tail=200" || true
                exit 1 ;;
            esac
          done
          if [ "$done" != "true" ]; then echo "::error::poll timed out"; exit 1; fi

      - name: Report output size
        run: |
          set -euo pipefail
          size=$(curl -sI -H "Authorization: Bearer $SHELLNET_JOB_TOKEN" \
            "$SHELLNET_JOB_URL/download?path=processed/cross_jurisdiction_twins.parquet" \
            | awk '/Content-Length/ {print $2}' | tr -d '\r')
          echo "  cross_jurisdiction_twins.parquet: ${size:-?} bytes"
