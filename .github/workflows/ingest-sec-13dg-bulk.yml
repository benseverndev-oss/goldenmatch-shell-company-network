name: Phase 6 — ingest SEC 13D/13G bulk (Railway-side compute)

# Walks the EDGAR full-index for the year/quarter baked into the
# `ingest_sec_13dg_bulk` allowlist entry in src/shellnet/job_server.py,
# fetches per-filing SGML headers, and emits filer->subject edges.
# Bump the year/quarter in the allowlist in a PR before re-running for
# a different window.

on:
  workflow_dispatch:

concurrency:
  group: ingest-sec-13dg-bulk
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    # Worst case ~5000 SGML fetches at 100 ms apart = ~10 min, plus parse.
    timeout-minutes: 45
    env:
      SHELLNET_JOB_URL: ${{ vars.SHELLNET_JOB_URL }}
      SHELLNET_JOB_TOKEN: ${{ secrets.SHELLNET_JOB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --frozen --no-dev
      - run: curl -fsS "$SHELLNET_JOB_URL/healthz"

      - name: Trigger ingest_sec_13dg_bulk
        run: |
          set -euo pipefail
          curl -fsS -X POST -H "Authorization: Bearer $SHELLNET_JOB_TOKEN" \
            "$SHELLNET_JOB_URL/run-script?name=ingest_sec_13dg_bulk"
          echo

      - name: Poll until complete
        run: |
          set -euo pipefail
          stage="script_ingest_sec_13dg_bulk"
          done=false
          # Up to ~40 minutes of polling.
          for _ in $(seq 1 480); do
            sleep 5
            s=$(curl -fsS -H "Authorization: Bearer $SHELLNET_JOB_TOKEN" "$SHELLNET_JOB_URL/status" \
                | python -c "import sys,json; d=json.load(sys.stdin); print(d['stages'].get('$stage',{}).get('status','?'))")
            echo "  $stage: $s"
            case "$s" in
              completed) done=true; break ;;
              failed)
                curl -fsS -H "Authorization: Bearer $SHELLNET_JOB_TOKEN" \
                  "$SHELLNET_JOB_URL/logs/$stage?tail=200" || true
                exit 1 ;;
            esac
          done
          if [ "$done" != "true" ]; then echo "::error::poll timed out"; exit 1; fi

      - name: Report output size
        run: |
          set -euo pipefail
          size=$(curl -sI -H "Authorization: Bearer $SHELLNET_JOB_TOKEN" \
            "$SHELLNET_JOB_URL/download?path=processed/sec_13dg_edges.parquet" \
            | awk '/Content-Length/ {print $2}' | tr -d '\r')
          echo "  sec_13dg_edges.parquet: ${size:-?} bytes"
