name: probe UK PSC for Apeiron / Angermayer (Railway-side)

# One-off investigative probe: scan the 5.79M-row OO UK PSC corpus
# for any rows naming the Dionissiev-adjacent Apeiron group or
# Angermayer's known co-officers. Output a small JSON to
# /data/processed/probes/apeiron_angermayer.json that we then
# download for local inspection. Heavy compute stays on Railway;
# laptop only receives the small result file.

on:
  workflow_dispatch:

concurrency:
  group: probe-psc-apeiron-angermayer
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SHELLNET_JOB_URL: ${{ vars.SHELLNET_JOB_URL }}
      SHELLNET_JOB_TOKEN: ${{ secrets.SHELLNET_JOB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --frozen --no-dev
      - run: curl -fsS "$SHELLNET_JOB_URL/healthz"

      - name: Trigger probe_psc_apeiron_angermayer
        run: |
          set -euo pipefail
          curl -fsS -X POST -H "Authorization: Bearer $SHELLNET_JOB_TOKEN" \
            "$SHELLNET_JOB_URL/run-script?name=probe_psc_apeiron_angermayer"
          echo

      - name: Poll until complete
        run: |
          set -euo pipefail
          stage="script_probe_psc_apeiron_angermayer"
          done=false
          for _ in $(seq 1 90); do
            sleep 5
            s=$(curl -fsS -H "Authorization: Bearer $SHELLNET_JOB_TOKEN" "$SHELLNET_JOB_URL/status" \
                | python -c "import sys,json; d=json.load(sys.stdin); print(d['stages'].get('$stage',{}).get('status','?'))")
            echo "  $stage: $s"
            case "$s" in
              completed) done=true; break ;;
              failed)
                curl -fsS -H "Authorization: Bearer $SHELLNET_JOB_TOKEN" \
                  "$SHELLNET_JOB_URL/logs/$stage?tail=200" || true
                exit 1 ;;
            esac
          done
          if [ "$done" != "true" ]; then echo "::error::poll timed out"; exit 1; fi
