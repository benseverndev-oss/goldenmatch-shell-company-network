name: Phase 16 — select SEC bridge endpoints as extra seeds (Railway-side)

# Reads sec_icij_bridges.parquet and emits bridge_endpoint_seeds.parquet
# for the next recluster. Must run AFTER bridge-sec-icij-by-name and
# BEFORE the expanded recluster.

on:
  workflow_dispatch:

concurrency:
  group: select-bridge-endpoints
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  select:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SHELLNET_JOB_URL: ${{ vars.SHELLNET_JOB_URL }}
      SHELLNET_JOB_TOKEN: ${{ secrets.SHELLNET_JOB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --frozen --no-dev
      - run: curl -fsS "$SHELLNET_JOB_URL/healthz"

      - name: Trigger select_bridge_endpoints
        run: |
          set -euo pipefail
          curl -fsS -X POST -H "Authorization: Bearer $SHELLNET_JOB_TOKEN" \
            "$SHELLNET_JOB_URL/run-script?name=select_bridge_endpoints"
          echo

      - name: Poll until complete
        run: |
          set -euo pipefail
          stage="script_select_bridge_endpoints"
          done=false
          for _ in $(seq 1 120); do
            sleep 5
            s=$(curl -fsS -H "Authorization: Bearer $SHELLNET_JOB_TOKEN" "$SHELLNET_JOB_URL/status" \
                | python -c "import sys,json; d=json.load(sys.stdin); print(d['stages'].get('$stage',{}).get('status','?'))")
            echo "  $stage: $s"
            case "$s" in
              completed) done=true; break ;;
              failed)
                curl -fsS -H "Authorization: Bearer $SHELLNET_JOB_TOKEN" \
                  "$SHELLNET_JOB_URL/logs/$stage?tail=200" || true
                exit 1 ;;
            esac
          done
          if [ "$done" != "true" ]; then echo "::error::poll timed out"; exit 1; fi
