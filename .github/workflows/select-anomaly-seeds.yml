name: Phase 11 — select anomaly-community seeds (Railway-side compute)

# Reads the previous recluster's anomaly + community parquets and emits
# anomaly_seed_uids.parquet for the next recluster pass. Cheap (~1 min)
# but must run AFTER one recluster (which produces the anomaly table)
# and BEFORE the next (which consumes the seeds parquet).

on:
  workflow_dispatch:

concurrency:
  group: select-anomaly-seeds
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  select:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SHELLNET_JOB_URL: ${{ vars.SHELLNET_JOB_URL }}
      SHELLNET_JOB_TOKEN: ${{ secrets.SHELLNET_JOB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --frozen --no-dev
      - run: curl -fsS "$SHELLNET_JOB_URL/healthz"

      - name: Trigger select_anomaly_seeds
        run: |
          set -euo pipefail
          curl -fsS -X POST -H "Authorization: Bearer $SHELLNET_JOB_TOKEN" \
            "$SHELLNET_JOB_URL/run-script?name=select_anomaly_seeds"
          echo

      - name: Poll until complete
        run: |
          set -euo pipefail
          stage="script_select_anomaly_seeds"
          done=false
          for _ in $(seq 1 120); do
            sleep 5
            s=$(curl -fsS -H "Authorization: Bearer $SHELLNET_JOB_TOKEN" "$SHELLNET_JOB_URL/status" \
                | python -c "import sys,json; d=json.load(sys.stdin); print(d['stages'].get('$stage',{}).get('status','?'))")
            echo "  $stage: $s"
            case "$s" in
              completed) done=true; break ;;
              failed)
                curl -fsS -H "Authorization: Bearer $SHELLNET_JOB_TOKEN" \
                  "$SHELLNET_JOB_URL/logs/$stage?tail=200" || true
                exit 1 ;;
            esac
          done
          if [ "$done" != "true" ]; then echo "::error::poll timed out"; exit 1; fi

      - name: Report output size
        run: |
          set -euo pipefail
          size=$(curl -s -H "Authorization: Bearer $SHELLNET_JOB_TOKEN" \
            -o /dev/null -w "%{size_download}" \
            "$SHELLNET_JOB_URL/download?path=processed/anomaly_seed_uids.parquet")
          echo "  anomaly_seed_uids.parquet: ${size:-?} bytes"
