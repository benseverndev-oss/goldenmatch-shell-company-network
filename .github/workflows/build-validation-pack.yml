name: build validation pack — cluster 47 (Railway-side compute)

on:
  workflow_dispatch:

concurrency:
  group: build-validation-pack-cluster-47
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SHELLNET_JOB_URL: ${{ vars.SHELLNET_JOB_URL }}
      SHELLNET_JOB_TOKEN: ${{ secrets.SHELLNET_JOB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --frozen --no-dev
      - run: curl -fsS "$SHELLNET_JOB_URL/healthz"
      - name: Trigger build_validation_pack_cluster_47
        run: |
          set -euo pipefail
          curl -fsS -X POST -H "Authorization: Bearer $SHELLNET_JOB_TOKEN" \
            "$SHELLNET_JOB_URL/run-script?name=build_validation_pack_cluster_47"
          echo
      - name: Poll until complete
        run: |
          set -euo pipefail
          stage="script_build_validation_pack_cluster_47"
          done=false
          for _ in $(seq 1 360); do
            sleep 5
            s=$(curl -fsS -H "Authorization: Bearer $SHELLNET_JOB_TOKEN" "$SHELLNET_JOB_URL/status" \
                | python -c "import sys,json; d=json.load(sys.stdin); print(d['stages'].get('$stage',{}).get('status','?'))")
            echo "  $stage: $s"
            case "$s" in
              completed) done=true; break ;;
              failed)
                curl -fsS -H "Authorization: Bearer $SHELLNET_JOB_TOKEN" \
                  "$SHELLNET_JOB_URL/logs/$stage?tail=200" || true
                exit 1 ;;
            esac
          done
          if [ "$done" != "true" ]; then echo "::error::poll timed out"; exit 1; fi
      - name: Download artifacts
        run: |
          set -euo pipefail
          mkdir -p docs/validation/data
          # Markdown + JSON + CSVs + graph paths land under /data/validation_packs/cluster_47/.
          for p in cluster_47.md \
                   data/cluster_47_profile.json \
                   data/cluster_47_person_overlap.csv \
                   data/cluster_47_person_company_roles.csv \
                   data/cluster_47_repeated_addresses.csv \
                   data/cluster_47_repeated_officers.csv \
                   data/cluster_47_repeated_agents.csv \
                   data/cluster_47_company_themes.csv \
                   data/cluster_47_external_search_queries.csv \
                   data/cluster_47_graph_paths.md; do
            curl -fsS -H "Authorization: Bearer $SHELLNET_JOB_TOKEN" \
              "$SHELLNET_JOB_URL/download?path=validation_packs/cluster_47/$p" \
              -o "docs/validation/$p"
          done
      - name: Commit + push to main
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/validation/cluster_47.md docs/validation/data/
          if git diff --cached --quiet; then echo "no changes"; exit 0; fi
          git commit -m "report: refresh cluster 47 validation pack (auto from build-validation-pack.yml)"
          git pull --rebase origin main
          git push origin HEAD:main
